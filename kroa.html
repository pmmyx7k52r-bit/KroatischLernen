<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kroatisch Master v3.5.5</title>
<style>
:root { --hr-blue: #002395; --bg: #f4f7f6; --red: #ff4444; }
body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
.card { max-width: 500px; width: 100%; background: white; padding: 20px; border-radius: 18px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 12px; box-sizing: border-box; }
input { width: 100%; padding: 14px; border: 2px solid #edf2f7; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; -webkit-appearance: none; }
.btn { padding: 16px; border: none; border-radius: 12px; font-weight: bold; color: white; font-size: 1rem; width: 100%; display: block; background: var(--hr-blue); margin-top: 5px; -webkit-tap-highlight-color: transparent; }
#dictionaryList { margin-top: 10px; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="card">
<h2>Test: Wort Hinzufügen</h2>
<input type="text" id="hrIn" placeholder="Kroatisch">
<input type="text" id="deIn" placeholder="Deutsch">
<button type="button" class="btn" onclick="
var h = document.getElementById('hrIn').value;
var d = document.getElementById('deIn').value;
if(h && d) {
var el = document.createElement('div');
el.innerText = h + ' = ' + d;
document.getElementById('dictionaryList').appendChild(el);
document.getElementById('hrIn').value = '';
document.getElementById('deIn').value = '';
alert('Wort hinzugefügt!');
} else {
alert('Bitte beide Felder füllen');
}
">SPEICHERN TESTEN</button>
</div>

<div class="card">
<h2>Wörterbuch (Temporär)</h2>
<div id="dictionaryList">Noch keine Wörter.</div>
</div>

<div class="card">
<h2>Info</h2>
<p style="font-size: 0.8rem; color: #666;">
Diese Version speichert <b>nichts</b> dauerhaft.
Wenn der Button "Wort hinzugefügt" anzeigt, liegt das Problem am iOS-Sicherheitssystem für lokalen Speicher.
</p>
</div>

</body>
</html>
